name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Toolchain + commands are defined once in mise.toml and invoked here via
# `mise run <task>`, so dev and CI run identical command bodies. jdx/mise-action
# installs the exact-pinned [tools] (uv + prek), trusts the config, and caches the
# tool binaries (cache key = mise.toml hash, so every Renovate pin bump refreshes
# it); actions/cache covers uv's wheel cache and the CPython it downloads.
# Python comes from .python-version — dev = CI = prod, no UV_PYTHON.
#
# All `uses:` are pinned to full commit SHAs (with a `# vX.Y.Z` comment that
# Dependabot keeps in sync) and every job starts with harden-runner in audit
# mode; zizmor (workflow-security.yml + prek) gates both conventions.

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: advisoryhub
          POSTGRES_PASSWORD: advisoryhub
          POSTGRES_DB: advisoryhub
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U advisoryhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Cache uv (wheels + managed Python)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv/python
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', '.python-version') }}

      - name: Install
        # mise run sync == `uv sync --locked --extra dev`. --locked fails if the
        # lock has drifted from pyproject.toml (run `uv lock` to refresh). uv
        # provisions CPython from .python-version.
        run: mise run sync

      - name: Lint
        run: mise run lint

      - name: Configure git for Phase D tests
        run: |
          git config --global user.email "ci@example.org"
          git config --global user.name  "CI"
          git config --global commit.gpgsign false
          git config --global tag.gpgsign false
          git config --global init.defaultBranch main

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://advisoryhub:advisoryhub@localhost:5432/advisoryhub
        run: mise run test -- -v --tb=short --cov --cov-report=term-missing

  django-checks:
    name: Django checks
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv/python
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', '.python-version') }}
      - run: mise run sync
      # `check --deploy` surfaces hardening advice under the test settings; kept
      # advisory (|| true), exactly as before. makemigrations-check is enforced.
      - run: mise run check || true
      - run: mise run makemigrations-check
      # Fail if the vendored htmx bundle drifts from its pinned sha256.
      - run: mise run verify-vendor
      # Fail on multi-line {# #} template comments (they render as literal text).
      - run: mise run check-templates
      # Fail on new advisories → workflows imports (workflows sits above advisories).
      - run: mise run check-imports

  typecheck:
    name: Type check (mypy + django-stubs)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv/python
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', '.python-version') }}
      - run: mise run sync
      - run: mise run typecheck

  typecheck-ty:
    name: Type check (ty, advisory)
    runs-on: ubuntu-latest
    # Advisory only: ty is preview and has no Django awareness yet, so it never
    # fails the build. It runs alongside the enforced mypy gate to surface the
    # categories it catches (config + rule tuning in pyproject).
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv/python
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', '.python-version') }}
      - run: mise run sync
      # mise run ty == `uv tool run ty check --python .venv`: ty as an isolated
      # tool, resolving imports against the project venv mise run sync populated.
      - run: mise run ty

  helm:
    name: Helm chart (lint + render + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      # No uv cache: the helm tasks need no Python environment.
      - run: mise run verify-chart-assets
      - run: mise run helm-lint
      - run: mise run helm-validate

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv/python
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', '.python-version') }}
      # Sync only the runtime dependencies (no dev extra), then audit them. A
      # known vulnerability with an available fix fails the job; pin/upgrade the
      # offending package (or use `pip-audit --ignore-vuln <ID>` with a note).
      - run: mise exec -- uv sync --locked
      - run: mise run audit
