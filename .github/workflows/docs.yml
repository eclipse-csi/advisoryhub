name: Docs

# Versioned documentation -> GitHub Pages (gh-pages branch): MkDocs +
# mkdocs-material, versioned with mike (one directory per version +
# versions.json; `latest` -> newest release via root redirect, `dev` -> main).
#
# Trigger semantics: GitHub does not evaluate path filters for tag pushes,
# so v* tags always deploy; main pushes deploy `dev` only on docs changes.
#
# No caches anywhere (mise-action cache: false, no actions/cache): this
# workflow publishes on tag pushes, so cached tooling would trip zizmor's
# cache-poisoning audit — same rationale as release.yml.
#
# Checkouts never persist credentials; mike commits locally and a dedicated
# step pushes gh-pages with the job token (env indirection only).
#
# Pages source is "GitHub Actions" (self-enabled by configure-pages): the
# gh-pages branch is only the version-state store mike appends to — nothing
# goes live until THIS workflow uploads the branch content as a Pages
# artifact and deploys it, so a stray push to gh-pages never publishes.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "docs/**"
      - mkdocs.yml
      - dev/deploy_docs.sh
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - "docs/**"
      - mkdocs.yml
      - dev/deploy_docs.sh
      - .github/workflows/docs.yml
  workflow_dispatch: # manual dev (re)deploy from main — first-run bootstrap

permissions: {}

jobs:
  build:
    name: Build (strict)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false

      # == `uv run --locked --extra docs mkdocs build --strict` (self-provisioning)
      - run: mise run docs-build

  deploy:
    name: Publish (mike + Pages deploy)
    if: github.event_name != 'pull_request' && (github.ref_type == 'tag' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the gh-pages branch
      pages: write # configure-pages enablement + deploy-pages
      id-token: write # deploy-pages OIDC deployment attestation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Fixed group, no cancel: main-push and tag-push deploys serialize on the
    # shared gh-pages branch.
    concurrency:
      group: docs-deploy
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      # Full clone: brings origin/gh-pages along (when it exists) and keeps
      # the push free of shallow-history negotiation.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false

      # Strict gate first — mike's internal mkdocs build is not strict.
      - name: Build gate (mkdocs --strict)
        run: mise run docs-build

      - name: Git identity for the mike commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # First run: branch exists nowhere yet — mike creates it. Later runs:
      # fork the local branch off the fetched remote ref so mike appends to
      # the published history.
      - name: Materialise gh-pages locally
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git branch --force gh-pages origin/gh-pages
          else
            echo "no gh-pages branch yet — mike will create it"
          fi

      - name: Gate — tag matches every recorded version
        if: github.ref_type == 'tag'
        run: bash dev/check_release_versions.sh "$GITHUB_REF_NAME"

      - name: Deploy release docs (X.Y.Z + latest, local commit)
        if: github.ref_type == 'tag'
        run: mise run docs-deploy -- "$GITHUB_REF_NAME"

      - name: Deploy dev docs (local commit)
        if: github.ref_type == 'branch'
        run: mise run docs-deploy -- dev

      - name: Push gh-pages (version-state store)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages

      # enablement: true creates/updates the Pages site with the workflow
      # build type on first run — no manual Settings -> Pages step.
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      # What Pages serves is the full content of the gh-pages branch (every
      # version + versions.json + the root redirect), freshly extracted from
      # the local branch mike just committed to.
      - name: Extract the site from gh-pages
        run: |
          mkdir -p /tmp/pages-site
          git archive gh-pages | tar -x -C /tmp/pages-site

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: /tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
