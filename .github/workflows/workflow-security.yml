name: Workflow security

# Static security analysis of the GitHub Actions workflows themselves.
#
#   * zizmor — the blocking gate (uv.lock-pinned, same command as the prek
#     commit hook and `mise run zizmor`; config in .github/zizmor.yml).
#   * poutine — BoostSecurity's pipeline scanner, advisory: findings land in
#     the job log and (best-effort) in code scanning, but don't fail the run —
#     its rule data ships with the action and isn't lock-pinned.
#
# SARIF uploads are continue-on-error: code scanning may be unavailable on a
# private personal repo, and a 403 there must never block the gate.

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  zizmor:
    name: zizmor (workflow audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload (best-effort)
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Cache uv (wheels + managed Python)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv/python
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', '.python-version') }}

      - run: mise run sync

      # The blocking gate: nonzero exit on any finding.
      - name: zizmor (gate)
        run: mise run zizmor

      # Best-effort code-scanning feed of the same audit (zizmor exits nonzero
      # when findings exist — the gate above already reported them).
      - name: zizmor SARIF
        if: always()
        run: uv run --no-sync zizmor --offline --format sarif .github/workflows > zizmor.sarif || true

      - name: Upload zizmor SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  poutine:
    name: poutine (pipeline audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload (best-effort)
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Defaults: poutine analyze_local $GITHUB_WORKSPACE --format sarif > results.sarif
      - name: poutine scan
        uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247 # v1.1.4

      # Surface findings in the job log — code scanning may be unavailable on
      # this repo, and a SARIF file nobody can open is not a report.
      - name: Show poutine findings
        if: always()
        run: |
          jq -r '.runs[].results[] | "\(.ruleId): \(.message.text)"' results.sarif || true

      - name: Upload poutine SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: poutine
