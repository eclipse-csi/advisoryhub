{{- if .Values.worker.autoscaling.enabled }}
# CPU utilisation is a weak proxy for queue depth on an I/O-bound worker —
# consider KEDA (broker queue length) for serious autoscaling. Never
# autoscale beat.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "advisoryhub.fullname" . }}-worker
  labels:
    {{- include "advisoryhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "advisoryhub.fullname" . }}-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
