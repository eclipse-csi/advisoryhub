{{- if .Values.metrics.prometheusRule.enabled }}
# The rule groups are a verbatim copy of dev/observability/rules/
# advisoryhub.rules.yml (sync-guarded by dev/check_chart_assets.sh). They
# match because the ServiceMonitors pin job=advisoryhub-web/-worker.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "advisoryhub.fullname" . }}
  labels:
    {{- include "advisoryhub.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- .Files.Get "files/prometheus-rules.yaml" | fromYaml | toYaml | nindent 2 }}
{{- end }}
