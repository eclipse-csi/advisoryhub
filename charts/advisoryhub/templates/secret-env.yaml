{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "advisoryhub.envSecretName" . }}
  labels:
    {{- include "advisoryhub.labels" . | nindent 4 }}
  {{- if .Values.migrate.enabled }}
  # The migrate hook Job runs at pre-install, before regular release resources
  # exist — hook-annotate this Secret so it is created first. Trade-off: hook
  # resources are not deleted by `helm uninstall`. The production path
  # (secrets.existingSecret) has no such caveat.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.values }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
