apiVersion: v1
kind: Service
metadata:
  name: {{ include "advisoryhub.fullname" . }}-web
  labels:
    {{- include "advisoryhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "advisoryhub.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}
