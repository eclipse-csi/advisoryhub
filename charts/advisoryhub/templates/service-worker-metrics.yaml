{{- if .Values.metrics.enabled }}
# Scrape target for the worker's Prometheus exporter (also a stable DNS name
# for debugging: curl <fullname>-worker-metrics:9808).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "advisoryhub.fullname" . }}-worker-metrics
  labels:
    {{- include "advisoryhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.workerPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "advisoryhub.selectorLabels" (dict "ctx" . "component" "worker") | nindent 4 }}
{{- end }}
