{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "advisoryhub.serviceAccountName" . }}
  labels:
    {{- include "advisoryhub.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The app never talks to the Kubernetes API.
automountServiceAccountToken: false
{{- end }}
