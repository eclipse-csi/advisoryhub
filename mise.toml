# mise.toml — AdvisoryHub dev/CI convenience layer (https://mise.jdx.dev).
#
# Scope (deliberately thin): mise provides the *bootstrap* tools a contributor
# would otherwise install by hand (uv + prek) and a task runner wrapping the
# commands already documented in README.md / CLAUDE.md. CI runs the same tasks.
#
# SINGLE SOURCE OF TRUTH IS PRESERVED:
#   * Python version            -> .python-version; uv reads it natively.
#                                  No `python` in [tools]: one interpreter everywhere.
#   * Dev tool versions         -> uv.lock (ruff/mypy/pytest/django-stubs/ty/…),
#                                  invoked via `uv run` / `uv tool run`; NEVER here.
#   * Runtime env (~68 vars)    -> docker-compose x-django-env anchor.
#
# First run: `mise trust && mise run setup`. Full PATH/venv auto-activation needs a
# shell hook (`eval "$(mise activate <shell>)"`); without it, `mise run <task>` and
# `mise exec` still load tools + env.

[tools]
uv = "latest"   # resolves to aqua:astral-sh/uv
prek = "latest" # fast Rust pre-commit (aqua:j178/prek); `mise run setup` wires git hooks
# Helm-chart toolchain (charts/advisoryhub) — bootstrap binaries like uv/prek,
# not Python tools, so they belong here rather than in uv.lock.
helm = "latest"        # aqua:helm/helm
kubeconform = "latest" # aqua:yannh/kubeconform
# Release toolchain (docs/contributing/releasing.md) — bootstrap binaries, same rationale.
git-cliff = "latest" # aqua:orhun/git-cliff — release notes from conventional commits
trivy = "latest"     # aqua:aquasecurity/trivy — dependency SBOM (CycloneDX) for releases
# NO python here  -> .python-version + uv own the interpreter.
# NO ruff/mypy/pytest/ty here -> they live in uv.lock, run via `uv run`.

[env]
# Activate the venv that `uv sync` creates. create = false so mise never races uv
# over .venv creation (the `sync`/`setup` task is the sole creator).
_.python.venv = { path = ".venv", create = false }
# DJANGO_SETTINGS_MODULE intentionally ABSENT (set per-task below): manage.py
# defaults to config.settings.dev, tests/checks need config.settings.test.

# ---- Onboarding (host) -----------------------------------------------------
[tasks.sync]
description = "Install the locked dev environment into .venv"
run = "uv sync --locked --extra dev"

[tasks.setup]
description = "First-run dev setup: sync deps + wire prek git hooks"
depends = ["sync"]
run = "prek install"

# ---- Quality gates (host; run uv.lock-pinned tools => local == CI) ---------
[tasks.lint]
description = "ruff lint + format check"
run = ["uv run ruff check .", "uv run ruff format --check ."]

[tasks.fix]
description = "ruff autofix + format (writes changes)"
run = ["uv run ruff check --fix .", "uv run ruff format ."]

[tasks.typecheck]
description = "mypy + django-stubs"
env = { DJANGO_SETTINGS_MODULE = "config.settings.test" }
run = "uv run mypy"

[tasks.ty]
description = "ty advisory type-check (mirrors CI; never blocks)"
run = "uv tool run ty check --python .venv"

[tasks.test]
description = "pytest against the compose Postgres (needs `mise run up`). Args: `mise run test -- -k name path/`"
env = { DJANGO_SETTINGS_MODULE = "config.settings.test" }
run = "uv run pytest"

[tasks.check]
description = "Django deploy system check"
env = { DJANGO_SETTINGS_MODULE = "config.settings.test" }
run = "uv run python manage.py check --deploy --fail-level WARNING"

[tasks.makemigrations-check]
description = "Fail if migrations are missing"
env = { DJANGO_SETTINGS_MODULE = "config.settings.test" }
run = "uv run python manage.py makemigrations --check --dry-run"

[tasks.audit]
description = "pip-audit on installed deps (mirrors CI security job)"
run = "uv run --with pip-audit pip-audit"

[tasks.verify-vendor]
description = "Verify vendored assets (htmx, fonts, altcha, JSON schemas) match their pinned hashes"
run = "bash dev/check_vendored_assets.sh"

[tasks.update-vendor]
description = "Re-vendor upstream assets to the version pinned in their .VERSION (Renovate postUpgradeTask)"
# Pure-stdlib script (urllib+hashlib) — system python3 so it never re-syncs the uv env.
run = "python3 dev/update_vendored_assets.py"

[tasks.check-templates]
description = "Fail on multi-line {# #} Django comments (they render as literal text)"
# Pure-stdlib script — run with system python3 so it never re-syncs / strips the
# uv dev environment (a plain `uv run python …` would sync to the default group).
run = "python3 dev/check_template_comments.py"

[tasks.zizmor]
description = "Security-audit the GitHub Actions workflows (mirrors CI's workflow-security job)"
# Offline: the online audits need a GitHub token and would make local != CI;
# action-version freshness is Dependabot's job. Config in .github/zizmor.yml.
run = "uv run zizmor --offline .github/workflows"

# ---- Helm chart (charts/advisoryhub) ---------------------------------------
[tasks.helm-lint]
description = "helm lint the chart against the default + every ci/ values fixture"
run = [
  "helm lint charts/advisoryhub",
  "helm lint charts/advisoryhub -f charts/advisoryhub/ci/minimal-values.yaml",
  "helm lint charts/advisoryhub -f charts/advisoryhub/ci/okd-values.yaml",
  "helm lint charts/advisoryhub -f charts/advisoryhub/ci/vanilla-values.yaml",
]

[tasks.helm-template]
description = "Render the chart (okd fixture) to stdout. Args pass through: `mise run helm-template -- -f my-values.yaml`"
run = "helm template advisoryhub charts/advisoryhub -f charts/advisoryhub/ci/okd-values.yaml"

[tasks.helm-validate]
description = "helm template | kubeconform for every ci/ fixture (CRD schemas from the datreeio catalog; `mise run helm-validate -- -i` skips them offline)"
# Wrapped in a script: kubeconform's '{{.Group}}' schema-location placeholders
# would otherwise be eaten by mise's own template engine.
run = "bash dev/validate_chart.sh"

[tasks.verify-chart-assets]
description = "Chart copies of the observability assets match their dev/observability/ sources"
run = "bash dev/check_chart_assets.sh"

# ---- Release (tag-driven; see docs/contributing/releasing.md) --------------
[tasks.changelog]
description = "Render release notes for the latest tag. Args pass through: `mise run changelog -- --unreleased --tag v0.2.0`"
run = "git-cliff --latest --strip header"

[tasks.sbom]
description = "CycloneDX SBOM of the locked dependencies (uv.lock) -> sbom.cdx.json"
run = "trivy fs --format cyclonedx --output sbom.cdx.json uv.lock"

[tasks.release-check]
description = "Gate: pyproject == uv.lock == Chart version/appVersion agree (optional arg: vX.Y.Z)"
run = "bash dev/check_release_versions.sh"

[tasks.release]
description = "Cut a release: lockstep version bump, signed commit + signed tag. Usage: `mise run release -- X.Y.Z`"
run = "bash dev/release.sh"

# ---- Documentation (docs/ -> GitHub Pages; see .github/workflows/docs.yml) -
[tasks.docs-build]
description = "mkdocs build --strict (broken links/anchors fail; mirrors CI's docs workflow)"
run = "uv run --locked --extra docs mkdocs build --strict"

[tasks.docs-serve]
description = "Live-preview the docs at http://127.0.0.1:8001 (8000 is the dev web app)"
run = "uv run --locked --extra docs mkdocs serve --dev-addr 127.0.0.1:8001"

[tasks.docs-deploy]
description = "mike-deploy the docs into the LOCAL gh-pages branch (nothing pushed). Usage: `mise run docs-deploy -- dev|vX.Y.Z`"
run = "bash dev/deploy_docs.sh"

# ---- Docker dev stack (verbatim wrappers of the README flow) --------------
[tasks.kanidm-up]
description = "Start only the dev OIDC provider (kanidm)"
run = "docker compose up -d kanidm"

[tasks.kanidm-setup]
description = "One-time kanidm bootstrap: cert, demo users, OAuth2 client"
run = "bash dev/kanidm/setup.sh"

[tasks.up]
description = "Start the full dev stack (postgres, valkey, kanidm, web, worker, beat)"
run = "docker compose up"

[tasks.down]
description = "Stop the dev stack"
run = "docker compose down"

[tasks.obs-up]
description = "Start the opt-in observability stack (Prometheus + Grafana). See dev/observability/README.md"
run = "docker compose --profile observability up prometheus grafana"

[tasks.obs-down]
description = "Stop the observability stack"
run = "docker compose --profile observability down"

[tasks.build]
description = "Rebuild the web/worker images (down -v wipes volumes, NOT images — run after a Dockerfile or dependency change)"
run = "docker compose build"

[tasks.reset]
description = "Wipe volumes, rebuild images, and re-bootstrap the dev stack (matches README)"
run = [
  "docker compose down -v",
  # down -v drops volumes but keeps cached images; rebuild so a changed
  # Dockerfile / uv.lock (e.g. a Python bump) is actually picked up.
  "docker compose build",
  "docker compose up -d kanidm",
  "bash dev/kanidm/setup.sh",
  "docker compose up",
]

[tasks.migrate]
description = "Apply DB migrations inside the web container"
run = "docker compose exec web python manage.py migrate"

[tasks.seed]
description = "Seed demo data + a local publish repo inside the web container"
run = "docker compose exec web python manage.py seed_demo --with-publish-repo /tmp/advisoryhub-pub.git"

[tasks.sbx]
usage = '''
arg "<name>" help="Sandbox name" default="claude-advisoryhub"
'''
description = "Start a new sandbox (remove the one with the same name if necessary)"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Start a fresh new sandbox '{{usage.name}}' (removing anyone with same name before)"

if sbx ls | grep -q -- "${usage_name}"; then
  sbx rm "${usage_name}"
fi

#--clone \
sbx create claude \
  --name "${usage_name}" \
  --kit .sbx-kit \
  .

sbx exec ${usage_name} bash <<EOF
claude plugin marketplace add GoogleChrome/modern-web-guidance
claude plugin install modern-web-guidance@googlechrome

cat >/home/agent/.claude/settings.json <<EOC
{
  "permissions": {
    "defaultMode": "plan"
  },
  "alwaysThinkingEnabled": true,
  "effortLevel": "xhigh",
  "skipDangerousModePermissionPrompt": true,
  "themeId": 1,
  "defaultMode": "plan",
  "bypassPermissionsModeAccepted": true,
  "model": "claude-opus-4-8"
}
EOC

git config --global commit.gpgsign true
git config --global gpg.format ssh
git config --global gpg.ssh.allowedSignersFile /home/agent/.gitallowedsigners
EOF

[[ -f "${HOME}/.gitallowedsigners" ]] && sbx cp "${HOME}/.gitallowedsigners" ${usage_name}:/home/agent/

sbx run claude --name "${usage_name}" .
'''
