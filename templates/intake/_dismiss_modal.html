{% load i18n %}
<dialog class="confirm-dialog">
  <form hx-post="{% url 'intake:triage_dismiss' report.id %}"
        hx-target="#modal"
        hx-swap="innerHTML">
    {% csrf_token %}
    <h3>{% translate "Dismiss this report?" %}</h3>
    <p>{% translate "Provide a short reason. This will be recorded in the audit log." %}</p>
    {% if error %}<p class="errors">{{ error }}</p>{% endif %}
    <label>{% translate "Reason (required)" %}
      <textarea name="reason" required rows="4" autofocus></textarea>
    </label>
    <div class="dialog-actions">
      <button type="button" data-dialog-close>{% translate "Cancel" %}</button>
      <button type="submit" class="danger">{% translate "Dismiss report" %}</button>
    </div>
  </form>
</dialog>
