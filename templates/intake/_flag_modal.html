{% load i18n %}
<dialog class="confirm-dialog" aria-labelledby="triage-flag-modal-title" data-light-dismiss>
  <form hx-post="{% url 'intake:triage_flag' report.id %}"
        hx-target="#modal"
        hx-swap="innerHTML">
    {% csrf_token %}
    <h3 id="triage-flag-modal-title">{% translate "Flag for admin routing" %}</h3>
    <p>{% translate "Briefly describe where this report should go and why. An admin will review and reassign." %}</p>
    {% if error %}<p class="errors">{{ error }}</p>{% endif %}
    <label>{% translate "Routing note (required)" %}
      <textarea name="note" required rows="4" autofocus></textarea>
    </label>
    <div class="dialog-actions">
      <button type="button" data-dialog-close>{% translate "Cancel" %}</button>
      <button type="submit">{% translate "Flag" %}</button>
    </div>
  </form>
</dialog>
